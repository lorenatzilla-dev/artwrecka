<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Wrecka — Book</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="site">
  <div id="header"></div>

  <main>
    <a class="article-back" href="library.html">← Back to library</a>

    <div class="book-detail-grid">
      <div class="book-cover" id="book-cover">📖</div>
      <div>
        <h1 class="book-detail-title" id="book-title"></h1>
        <div class="book-detail-author" id="book-author"></div>
        <div class="book-meta-table">
          <div class="book-meta-row">
            <span class="book-meta-label">Genre</span>
            <span class="book-genre" id="book-genre"></span>
          </div>
          <div class="book-meta-row">
            <span class="book-meta-label">Year read</span>
            <span id="book-year"></span>
          </div>
          <div class="book-meta-row">
            <span class="book-meta-label">Rating</span>
            <div class="stars" id="book-stars"></div>
          </div>
          <div class="book-meta-row">
            <span class="book-meta-label">Pages</span>
            <span id="book-pages"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="book-review" id="book-review">
      <p>Your review or notes go here. What did you think of it? What stayed with you? What would you tell a friend considering picking it up?</p>
    </div>
  </main>
</div>

<div class="site" id="footer-wrap"></div>

<script src="js/data.js"></script>
<script>
  const slug = new URLSearchParams(location.search).get('slug');
  const book = BOOKS.find(b => b.slug === slug) || BOOKS[0];

  document.title = `Art Wrecka — ${book.title}`;

  document.getElementById('header').innerHTML      = headerHTML('library');
  document.getElementById('footer-wrap').innerHTML = footerHTML();

  document.getElementById('book-title').textContent  = book.title;
  document.getElementById('book-author').textContent = book.author;
  document.getElementById('book-year').textContent   = book.year;
  document.getElementById('book-pages').textContent  = book.pages ? book.pages + ' pages' : '—';
  if (book.review) document.getElementById('book-review').innerHTML = book.review;

  const genreEl = document.getElementById('book-genre');
  genreEl.textContent = book.genre;
  genreEl.classList.add(book.genreClass);

  document.getElementById('book-stars').innerHTML = starsDisplay(book.stars);
</script>
</body>
</html>
