<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Wrecka — Article</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="site">
  <div id="header"></div>

  <main>
    <div class="layout">
      <div>
        <a class="article-back" href="index.html">← Back to blog</a>
        <div class="article-hero" id="article-hero"></div>
        <div class="article-header-meta" id="article-meta"></div>
        <h1 class="article-title" id="article-title"></h1>
        <div class="article-subtitle" id="article-subtitle"></div>
        <div class="article-body" id="article-body"></div>
        <div class="article-tags" id="article-tags"></div>
      </div>
      <div class="col-sep" aria-hidden="true"></div>
      <aside class="sidebar" aria-label="About and recent posts">
        <div id="sidebar"></div>
      </aside>
    </div>
  </main>
</div>

<div class="site" id="footer-wrap"></div>

<script src="js/data.js"></script>
<script>
  const slug = new URLSearchParams(location.search).get('slug');
  const post = POSTS.find(p => p.slug === slug) || POSTS[0];

  document.title = `Art Wrecka — ${post.title}`;

  document.getElementById('header').innerHTML      = headerHTML('blog');
  document.getElementById('sidebar').innerHTML     = sidebarHTML();
  document.getElementById('footer-wrap').innerHTML = footerHTML();

  // Hero: cover image first, then video inline in body if present, else plain thumb
  const heroEl = document.getElementById('article-hero');
  if (post.thumb) {
    heroEl.innerHTML = `<img src="${post.thumb}" alt="${post.title}">`;
  } else {
    heroEl.style.display = 'none';
  }
  // If there's a video, inject it at the top of the body
  if (post.video) {
    post.body = `<div class="article-image" style="margin-bottom:1.25rem">
      <video src="${post.video}" controls playsinline style="width:100%;border-radius:8px;display:block"></video>
    </div>` + post.body;
  }

  document.getElementById('article-meta').textContent   = `${post.date} · Art Wrecka · ${post.readTime}`;
  document.getElementById('article-title').textContent  = post.title;
  document.getElementById('article-subtitle').textContent = post.subtitle || '';
  document.getElementById('article-body').innerHTML     = post.body;
  document.getElementById('article-tags').innerHTML     = post.tags.map(t =>
    `<span class="article-tag">${t}</span>`
  ).join('');
</script>
</body>
</html>
