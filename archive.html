<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Art Wrecka — Archive</title>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="site">
  <div id="header"></div>
  <main id="archive-content"></main>
</div>

<div class="site" id="footer-wrap"></div>

<script src="js/data.js"></script>
<script>
  document.getElementById('header').innerHTML      = headerHTML('archive');
  document.getElementById('footer-wrap').innerHTML = footerHTML();

  const grouped = {};
  POSTS.forEach(p => {
    if (!grouped[p.year]) grouped[p.year] = {};
    if (!grouped[p.year][p.month]) grouped[p.year][p.month] = [];
    grouped[p.year][p.month].push(p);
  });

  const years = Object.keys(grouped).sort((a, b) => b - a);

  document.getElementById('archive-content').innerHTML = years.map(year => {
    const months = Object.keys(grouped[year]);
    const total  = months.reduce((sum, m) => sum + grouped[year][m].length, 0);

    const monthsHTML = months.map(month => {
      const postsHTML = grouped[year][month].map(p => `
        <div class="archive-post">
          <a href="article.html?slug=${p.slug}">→ ${p.title}</a>
          <span class="archive-post-date">${p.date}</span>
        </div>
      `).join('');
      return `
        <div class="archive-month">
          <div class="archive-month-title">${month}</div>
          ${postsHTML}
        </div>
      `;
    }).join('');

    return `
      <section class="archive-year" aria-label="${year}">
        <h2 class="archive-year-title">
          ${year} <span class="count-badge">${total}</span>
        </h2>
        ${monthsHTML}
      </section>
    `;
  }).join('');
</script>
</body>
</html>
